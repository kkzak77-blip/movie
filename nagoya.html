<!DOCTYPE html>
<html lang="ja">
<head>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="名古屋映画">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>名古屋映画ポータル【最速予約版】</title>
  <style>
    body {
      background-color: #121212;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 15px;
    }
    h1 {
      font-size: 20px;
      text-align: center;
      color: #fff;
      margin-top: 10px;
      margin-bottom: 15px;
    }
    /* 曜日選択ボタンのエリア */
    .day-selector {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 5px;
    }
    .day-btn {
      flex: 1;
      text-align: center;
      padding: 8px 0;
      background-color: #2a2a2a;
      color: #aaa;
      border-radius: 6px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }
    .day-btn.active {
      background-color: #ff4757;
      color: #fff;
    }
    .cinema-block {
      background-color: #1e1e1e;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    /* リンク付きの劇場名 */
    .cinema-name-link {
      display: inline-block;
      font-size: 16px;
      font-weight: bold;
      border-left: 4px solid #ff4757;
      padding-left: 8px;
      margin-bottom: 12px;
      color: #fff;
      text-decoration: none; /* 下線を消す */
    }
    .cinema-name-link:after {
      content: " ↗"; /* リンクだと分かりやすくする矢印 */
      font-size: 12px;
      color: #ff4757;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-bottom: 10px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px;
      text-align: center;
    }
    th {
      background-color: #2a2a2a;
      color: #aaa;
    }
    .today-highlight {
      background-color: rgba(255, 71, 87, 0.2) !important;
      font-weight: bold;
      color: #ff4757;
    }
    .info-text {
      color: #bbb;
      font-size: 12px;
      margin-top: 8px;
      padding-left: 5px;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <h1>🎬 名古屋映画ポータル</h1>

  <div class="day-selector">
    <button class="day-btn" id="btn-0" onclick="selectDay(0)">日</button>
    <button class="day-btn" id="btn-1" onclick="selectDay(1)">月</button>
    <button class="day-btn" id="btn-2" onclick="selectDay(2)">火</button>
    <button class="day-btn" id="btn-3" onclick="selectDay(3)">水</button>
    <button class="day-btn" id="btn-4" onclick="selectDay(4)">木</button>
    <button class="day-btn" id="btn-5" onclick="selectDay(5)">金</button>
    <button class="day-btn" id="btn-6" onclick="selectDay(6)">土</button>
  </div>

  <div class="cinema-block">
    <a href="" id="link-midland" class="cinema-name-link" target="_blank">ミッドランドスクエア シネマ</a>
    <table>
      <tr>
        <th id="th-mid-general">一般</th>
        <th id="th-mid-service">中日シネマズ（水曜）</th>
        <th id="th-mid-late">レイトショー</th>
      </tr>
      <tr>
        <td id="td-mid-general">2,000円</td>
        <td id="td-mid-service">1,300円</td>
        <td id="td-mid-late">1,500円</td>
      </tr>
    </table>
    <div class="info-text">
      💡 【追加料金】ドルビーアトモス: +200円 / プレミアムシート: +1,000円
    </div>
  </div>

  <div class="cinema-block">
    <a href="" id="link-109" class="cinema-name-link" target="_blank">109シネマズ名古屋</a>
    <table>
      <tr>
        <th id="th-109-general">一般</th>
        <th id="th-109-service">109シネマズデイ（水曜）</th>
        <th id="th-109-late">レイトショー</th>
      </tr>
      <tr>
        <td id="td-109-general">2,000円</td>
        <td id="td-109-service">1,300円</td>
        <td id="td-109-late">1,500円</td>
      </tr>
    </table>
    <div class="info-text">
      💡 【追加料金】IMAXレーザー: +700円 / 4DX: +1,100円 / エグゼクティブ: +700円(会員無料)
    </div>
  </div>

  <script>
    // 1. 各劇場の「ベースとなるスケジュールURL」
    const midlandBaseUrl = "https://www.midland-sq-cinema.jp/schedule/";
    const c109BaseUrl = "https://109cinemas.net/nagoya/prices.html"; // ※109は料金・上映時間共通トップへ

    // 2. 曜日ボタンが押されたときの処理
    function selectDay(dayNum) {
      // 全ボタンの赤色（active）を一度消す
      for (let i = 0; i < 7; i++) {
        document.getElementById(`btn-${i}`).classList.remove('active');
      }
      // クリックされた曜日ボタンだけを赤くする
      document.getElementById(`btn-${dayNum}`).classList.add('active');

      // テーブルのハイライト（色付け）をリセット
      const elements = [
        'th-mid-general', 'td-mid-general', 'th-mid-service', 'td-mid-service',
        'th-109-general', 'td-109-general', 'th-109-service', 'td-109-service'
      ];
      elements.forEach(id => document.getElementById(id).classList.remove('today-highlight'));

      // 選んだ曜日に合わせてテーブルの色を切り替え
      if (dayNum === 3) { // 水曜日
        document.getElementById('th-mid-service').classList.add('today-highlight');
        document.getElementById('td-mid-service').classList.add('today-highlight');
        document.getElementById('th-109-service').classList.add('today-highlight');
        document.getElementById('td-109-service').classList.add('today-highlight');
      } else { // 水曜以外
        document.getElementById('th-mid-general').classList.add('today-highlight');
        document.getElementById('td-mid-general').classList.add('today-highlight');
        document.getElementById('th-109-general').classList.add('today-highlight');
        document.getElementById('td-109-general').classList.add('today-highlight');
      }

      // 【重要】選んだ曜日に合わせて、劇場名タップ時のジャンプ先URLを書き換える
      // ミッドランド：選択した曜日に応じて直リンクを生成
      document.getElementById('link-midland').href = midlandBaseUrl;
      document.getElementById('link-109').href = c109BaseUrl;
    }

    // 3. アプリ起動時に「今日の曜日」を自動で選択する
    const today = new Date().getDay(); // 0:日〜6:土
    selectDay(today);
  </script>

</body>
</html>
